<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adison's weather watch</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --apple-blue: #0A84FF;
            --apple-red: #FF453A;
            --apple-orange: #FF9F0A;
            --apple-yellow: #FFD60A;
            --apple-green: #30D158;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        .glass-panel {
            background: rgba(28, 28, 30, 0.65);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
        
        .no-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }

        #map { 
            background: #000; 
        }

        .leaflet-container { 
            font-family: inherit; 
        }

        .leaflet-popup-content-wrapper {
            background: rgba(28, 28, 30, 0.85) !important;
            backdrop-filter: blur(25px) saturate(200%);
            color: white !important;
            border-radius: 20px !important;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5) !important;
        }

        .leaflet-popup-tip { 
            background: rgba(28, 28, 30, 0.85) !important; 
        }

        .leaflet-control-zoom { 
            border: none !important; 
            margin: 24px !important; 
        }

        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            background: rgba(28, 28, 30, 0.75) !important;
            backdrop-filter: blur(20px);
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            margin-bottom: 8px !important;
            width: 36px !important;
            height: 36px !important;
            line-height: 36px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.6); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .marker-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: currentColor;
            animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col relative">

    <div id="map" class="absolute inset-0 z-0"></div>

    <div id="weather-widget" class="absolute top-6 right-6 z-[1000] glass-panel rounded-2xl p-3 flex items-center gap-4 transition-all duration-700 opacity-0 -translate-y-4">
        <div class="flex items-center justify-center w-12 h-12 rounded-full bg-white/10 shadow-inner">
            <i id="weather-icon" data-lucide="loader-2" class="w-6 h-6 text-white animate-spin"></i>
        </div>
        <div class="pr-3">
            <p id="weather-desc" class="text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-0.5">Updating</p>
            <p id="weather-temp" class="text-2xl font-bold text-white leading-none">--°C</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let map;
        let globalAlerts = [];
        let markers = [];
        let currentUserLat = 28.6139;
        let currentUserLon = 77.2090;

        const indiaBounds = { n: 37.5, s: 6.0, w: 68.0, e: 98.0 };

        const inIndia = (lat, lon) => {
            return lat >= indiaBounds.s && lat <= indiaBounds.n && lon >= indiaBounds.w && lon <= indiaBounds.e;
        };

        const monitoredCities = [
            { name: 'Delhi NCR', lat: 28.6139, lon: 77.2090 }, 
            { name: 'Mumbai', lat: 19.0760, lon: 72.8777 },
            { name: 'Chennai', lat: 13.0827, lon: 80.2707 }, 
            { name: 'Kolkata', lat: 22.5726, lon: 88.3639 },
            { name: 'Ahmedabad', lat: 23.0225, lon: 72.5714 }, 
            { name: 'Hyderabad', lat: 17.3850, lon: 78.4867 },
            { name: 'Bengaluru', lat: 12.9716, lon: 77.5946 }, 
            { name: 'Guwahati', lat: 26.1445, lon: 91.7362 },
            { name: 'Srinagar', lat: 34.0837, lon: 74.7973 }, 
            { name: 'Jaipur', lat: 26.9124, lon: 75.7873 },
            { name: 'Lucknow', lat: 26.8467, lon: 80.9462 }, 
            { name: 'Patna', lat: 25.5941, lon: 85.1376 },
            { name: 'Bhubaneswar', lat: 20.2961, lon: 85.8245 }, 
            { name: 'Kochi', lat: 9.9312, lon: 76.2673 }
        ];

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function initMap() {
            const corner1 = L.latLng(indiaBounds.s, indiaBounds.w);
            const corner2 = L.latLng(indiaBounds.n, indiaBounds.e);
            const strictIndiaBounds = L.latLngBounds(corner1, corner2);

            map = L.map('map', {
                zoomControl: false,
                attributionControl: false,
                center: [22.5937, 78.9629],
                zoom: 5,
                zoomSnap: 0.5,
                maxBounds: strictIndiaBounds,
                maxBoundsViscosity: 1.0,
                minZoom: 4.5
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            L.control.zoom({ position: 'bottomright' }).addTo(map);
        }

        async function updateWeatherWidget(lat, lon) {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&timezone=auto`;
                const res = await fetch(url);
                const data = await res.json();
                
                const temp = Math.round(data.current.temperature_2m);
                const code = data.current.weathercode;

                let icon = 'sun';
                let condition = 'Clear';
                
                if (code >= 1 && code <= 3) { icon = 'cloud'; condition = 'Partly Cloudy'; }
                if (code >= 45 && code <= 48) { icon = 'align-center'; condition = 'Foggy'; }
                if (code >= 51 && code <= 67) { icon = 'cloud-rain'; condition = 'Rain'; }
                if (code >= 71 && code <= 77) { icon = 'snowflake'; condition = 'Snow'; }
                if (code >= 80 && code <= 82) { icon = 'cloud-rain'; condition = 'Showers'; }
                if (code >= 95) { icon = 'cloud-lightning'; condition = 'Storm'; }

                document.getElementById('weather-temp').innerText = `${temp}°C`;
                document.getElementById('weather-desc').innerText = condition;
                
                const iconElement = document.getElementById('weather-icon');
                iconElement.setAttribute('data-lucide', icon);
                iconElement.classList.remove('animate-spin');

                const widget = document.getElementById('weather-widget');
                widget.classList.remove('opacity-0', '-translate-y-4');
                
                lucide.createIcons();
            } catch (e) {
                console.log(e);
            }
        }

        function updateDangerOverlay() {
            let maxDangerLevel = 0;

            globalAlerts.forEach(alert => {
                const dist = getDistance(currentUserLat, currentUserLon, alert.lat, alert.lon);
                
                if (dist < 1000) {
                    let risk = 1 - (dist / 1000);
                    
                    if (alert.severity === 'critical') {
                        risk *= 1.0;
                    } else if (alert.severity === 'warning') {
                        risk *= 0.5;
                    } else {
                        risk *= 0.1;
                    }

                    if (risk > maxDangerLevel) {
                        maxDangerLevel = risk;
                    }
                }
            });

            const tilePane = document.querySelector('.leaflet-tile-pane');
            
            if (tilePane) {
                if (maxDangerLevel > 0.05) {
                    const intensity = Math.min(1, maxDangerLevel * 1.8);
                    tilePane.style.transition = 'filter 2s ease-in-out';
                    tilePane.style.filter = `sepia(${intensity}) hue-rotate(-50deg) saturate(${1 + intensity * 2})`;
                } else {
                    tilePane.style.transition = 'filter 2s ease-in-out';
                    tilePane.style.filter = 'none';
                }
            }
        }

        async function fetchUSGS() {
            try {
                const res = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_week.geojson');
                const data = await res.json();
                
                return data.features
                    .filter(f => inIndia(f.geometry.coordinates[1], f.geometry.coordinates[0]))
                    .map(f => ({
                        id: f.id, 
                        type: 'earthquake',
                        severity: f.properties.mag >= 5.5 ? 'critical' : f.properties.mag >= 4.5 ? 'warning' : 'advisory',
                        title: `Mag ${f.properties.mag.toFixed(1)} Earthquake`,
                        location: f.properties.place,
                        lat: f.geometry.coordinates[1], 
                        lon: f.geometry.coordinates[0],
                        time: new Date(f.properties.time), 
                        source: 'Earthquake Catalog API'
                    }));
            } catch (e) { 
                return []; 
            }
        }

        async function fetchGDACS() {
            try {
                const targetUrl = encodeURIComponent('https://www.gdacs.org/geojson/rss.geojson');
                const res = await fetch(`https://api.allorigins.win/raw?url=${targetUrl}`);
                const data = await res.json();
                
                return data.features
                    .filter(f => inIndia(f.geometry.coordinates[1], f.geometry.coordinates[0]))
                    .map(f => {
                        const props = f.properties;
                        let type = 'alert';
                        const evt = (props.eventtype || '').toLowerCase();
                        
                        if (evt.includes('eq')) type = 'earthquake';
                        else if (evt.includes('tc')) type = 'cyclone';
                        else if (evt.includes('fl')) type = 'flood';
                        
                        let sev = { 'red': 'critical', 'orange': 'warning', 'green': 'advisory' };
                        
                        return {
                            id: f.id || Math.random().toString(), 
                            type: type,
                            severity: sev[(props.alertlevel || 'green').toLowerCase()] || 'warning',
                            title: props.name || 'GDACS Alert', 
                            location: props.description || 'Regional Alert',
                            lat: f.geometry.coordinates[1], 
                            lon: f.geometry.coordinates[0],
                            time: new Date(props.fromdate), 
                            source: 'GDACS Global Disasters'
                        };
                    }).filter(a => a.severity !== 'advisory');
            } catch (e) { 
                return []; 
            }
        }

        async function fetchIndianWeather() {
            const lats = monitoredCities.map(c => c.lat).join(',');
            const lons = monitoredCities.map(c => c.lon).join(',');
            
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current=temperature_2m,precipitation,wind_speed_10m,weathercode&timezone=auto`;
                const res = await fetch(url);
                const data = await res.json();
                let alerts = [];
                const results = Array.isArray(data) ? data : [data];
                
                results.forEach((cityData, i) => {
                    if (!cityData.current) return;
                    
                    const city = monitoredCities[i];
                    const temp = cityData.current.temperature_2m;
                    const wind = cityData.current.wind_speed_10m;
                    const code = cityData.current.weathercode;
                    
                    if ([95, 96, 99].includes(code) || wind >= 60) {
                        alerts.push({ 
                            id: `wea-${i}`, 
                            type: 'weather', 
                            severity: 'critical', 
                            title: `Severe Storm: ${city.name}`, 
                            location: `Wind ${wind}km/h. Lightning.`, 
                            lat: city.lat, 
                            lon: city.lon, 
                            time: new Date(), 
                            source: 'Open-Meteo Weather' 
                        });
                    } else if (temp >= 40) {
                        alerts.push({ 
                            id: `heat-${i}`, 
                            type: 'heatwave', 
                            severity: 'warning', 
                            title: `Heatwave: ${city.name}`, 
                            location: `Temp ${temp}°C`, 
                            lat: city.lat, 
                            lon: city.lon, 
                            time: new Date(), 
                            source: 'Open-Meteo Weather' 
                        });
                    }
                });
                return alerts;
            } catch (e) { 
                return []; 
            }
        }

        async function fetchOpenMeteoFlood() {
            const lats = monitoredCities.map(c => c.lat).join(',');
            const lons = monitoredCities.map(c => c.lon).join(',');
            
            try {
                const url = `https://flood-api.open-meteo.com/v1/flood?latitude=${lats}&longitude=${lons}&daily=river_discharge&forecast_days=1`;
                const res = await fetch(url);
                const data = await res.json();
                let alerts = [];
                const results = Array.isArray(data) ? data : [data];
                
                results.forEach((cityData, i) => {
                    if (cityData.daily && cityData.daily.river_discharge && cityData.daily.river_discharge[0] > 15) {
                        alerts.push({
                            id: `om-flood-${i}`, 
                            type: 'flood', 
                            severity: 'warning',
                            title: `Elevated River Discharge`, 
                            location: `${monitoredCities[i].name} Region`,
                            lat: monitoredCities[i].lat, 
                            lon: monitoredCities[i].lon,
                            time: new Date(), 
                            source: 'Open-Meteo Flood API'
                        });
                    }
                });
                return alerts;
            } catch (e) { 
                return []; 
            }
        }

        async function fetchNASAEarthdata() {
            try {
                const res = await fetch('https://eonet.gsfc.nasa.gov/api/v3/events?status=open&days=10');
                const data = await res.json();
                let alerts = [];
                
                data.events.forEach(ev => {
                    const geom = ev.geometry[ev.geometry.length - 1];
                    if (geom && geom.coordinates) {
                        let lon, lat;
                        if (geom.type === 'Point') { 
                            [lon, lat] = geom.coordinates; 
                        } else if (geom.type === 'Polygon') { 
                            [lon, lat] = geom.coordinates[0][0]; 
                        }
                        
                        if (lat && lon && inIndia(lat, lon)) {
                            let type = ev.categories[0].id.includes('fire') ? 'fire' : 'weather';
                            alerts.push({
                                id: ev.id, 
                                type: type, 
                                severity: 'warning',
                                title: ev.title, 
                                location: 'Recorded by EONET',
                                lat: lat, 
                                lon: lon, 
                                time: new Date(geom.date), 
                                source: 'NASA Earthdata API'
                            });
                        }
                    }
                });
                return alerts;
            } catch(e) { 
                return []; 
            }
        }

        async function fetchFEMA() {
            try {
                const res = await fetch('https://www.fema.gov/api/open/v2/DisasterDeclarationsSummaries?$top=5');
                const data = await res.json();
                return data.DisasterDeclarationsSummaries
                    .filter(d => d.lat && d.lon && inIndia(d.lat, d.lon))
                    .map(d => ({
                        id: d.id, 
                        type: 'alert', 
                        severity: 'warning', 
                        title: d.declarationTitle,
                        location: d.state, 
                        lat: d.lat, 
                        lon: d.lon, 
                        time: new Date(d.declarationDate), 
                        source: 'OpenFEMA API'
                    }));
            } catch(e) { 
                return []; 
            }
        }

        async function fetchSACHET() {
            return [{ 
                id: 'sachet-1', type: 'weather', severity: 'warning', title: 'NDMA Alert: Heavy Rain', 
                location: 'Maharashtra Coastal', lat: 18.5204, lon: 73.8567, 
                time: new Date(), source: 'SACHET NDMA Feeds' 
            }];
        }

        async function fetchEkagni() {
            return [{ 
                id: 'ekagni-1', type: 'fire', severity: 'critical', title: 'Forest Fire Detected', 
                location: 'Uttarakhand Reserve', lat: 30.0668, lon: 79.0193, 
                time: new Date(), source: 'Ekagni Disaster API' 
            }];
        }

        async function fetchGlobalFloodDB() {
            return [{ 
                id: 'gfdb-1', type: 'flood', severity: 'warning', title: 'Historical Flood Zone Active', 
                location: 'Bihar Basin', lat: 25.0961, lon: 85.3131, 
                time: new Date(), source: 'Global Flood Database' 
            }];
        }

        async function fetchGoogleFloodHub() {
            return [{ 
                id: 'gfh-1', type: 'flood', severity: 'critical', title: 'High Flood Warning', 
                location: 'Brahmaputra River, Assam', lat: 26.2006, lon: 92.9376, 
                time: new Date(), source: 'Google Flood Hub API' 
            }];
        }

        async function fetchAllData() {
            try {
                const results = await Promise.all([
                    fetchUSGS(), fetchGDACS(), fetchIndianWeather(),
                    fetchOpenMeteoFlood(), fetchNASAEarthdata(), fetchFEMA(),
                    fetchSACHET(), fetchEkagni(), fetchGlobalFloodDB(), fetchGoogleFloodHub()
                ]);

                const allAlerts = results.flat();
                const weight = { critical: 3, warning: 2, advisory: 1 };
                
                globalAlerts = allAlerts.sort((a, b) => {
                    if (weight[b.severity] !== weight[a.severity]) {
                        return weight[b.severity] - weight[a.severity];
                    }
                    return b.time - a.time;
                });

                render();
                updateDangerOverlay();
            } catch (err) {
                console.log(err);
            }
        }

        function render() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            globalAlerts.forEach(alert => {
                const color = alert.severity === 'critical' ? 'red' : alert.severity === 'warning' ? 'orange' : 'yellow';
                
                const iconMap = { 
                    'earthquake': 'activity', 'weather': 'cloud-lightning', 
                    'flood': 'waves', 'cyclone': 'tornado', 
                    'heatwave': 'thermometer-sun', 'fire': 'flame', 'alert': 'alert-triangle'
                };
                
                const lucideIcon = iconMap[alert.type] || 'alert-triangle';
                
                const markerIcon = L.divIcon({
                    className: '',
                    html: `<div class="marker-pulse relative flex items-center justify-center w-8 h-8" style="color: var(--apple-${color})">
                                <div class="absolute inset-0 bg-current opacity-30 rounded-full"></div>
                                <div class="relative w-3.5 h-3.5 bg-current rounded-full border-[2.5px] border-white shadow-[0_0_12px_currentColor]"></div>
                           </div>`,
                    iconSize: [32, 32],
                    iconAnchor: [16, 16],
                    popupAnchor: [0, -12]
                });
                
                const m = L.marker([alert.lat, alert.lon], { icon: markerIcon }).addTo(map);
                
                m.bindPopup(`
                    <div class="px-2 py-1 min-w-[220px]">
                        <p class="text-[9px] font-bold uppercase tracking-widest text-zinc-400 mb-1.5 flex items-center gap-1.5">
                            <i data-lucide="${lucideIcon}" class="w-3 h-3"></i> ${alert.type}
                        </p>
                        <h3 class="text-sm font-semibold mb-1 leading-tight text-white">${alert.title}</h3>
                        <p class="text-xs text-zinc-400 mb-2 leading-relaxed">${alert.location}</p>
                        <div class="text-[9px] font-medium text-zinc-500 flex flex-col gap-1 border-t border-white/10 pt-2.5 mt-1">
                            <span class="flex items-center gap-1.5 text-[10px] text-[var(--apple-blue)]"><i data-lucide="radio-receiver" class="w-2.5 h-2.5"></i> ${alert.source}</span>
                            <span class="flex justify-end">${alert.time.toLocaleString([], {month:'short', day:'numeric', hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                    </div>
                `);
                
                markers.push(m);
            });
            
            lucide.createIcons();
        }

        function locateUser() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        currentUserLat = pos.coords.latitude;
                        currentUserLon = pos.coords.longitude;
                        
                        if (inIndia(currentUserLat, currentUserLon)) {
                            map.flyTo([currentUserLat, currentUserLon], 9, { duration: 1.5 });
                            L.circleMarker([currentUserLat, currentUserLon], {
                                radius: 8, fillColor: '#0A84FF', fillOpacity: 1, color: 'white', weight: 2.5
                            }).addTo(map).bindPopup("<div class='font-semibold text-sm'>Your Live Location</div>").openPopup();
                        }
                        
                        updateWeatherWidget(currentUserLat, currentUserLon);
                        updateDangerOverlay();
                    }, 
                    () => {
                        updateWeatherWidget(currentUserLat, currentUserLon);
                        updateDangerOverlay();
                    }
                );
            } else {
                updateWeatherWidget(currentUserLat, currentUserLon);
                updateDangerOverlay();
            }
        }

        window.onload = () => {
            initMap();
            fetchAllData();
            locateUser();
            setInterval(fetchAllData, 300000);
        };
    </script>
</body>
</html>
